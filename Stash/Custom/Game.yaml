- AND,((SRC-IP-CIDR,192.168.0.100/32),(NETWORK,UDP),(DST-PORT,27000-27100))  # Steam 游戏/语音
- AND,((SRC-IP-CIDR,192.168.0.105/32),(NETWORK,UDP),(DST-PORT,4380))  # Steam
