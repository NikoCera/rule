payload:
# ── Switch 全流量规则 ──
- SRC-IP-CIDR,192.168.0.120/32  # Switch Eth
- SRC-IP-CIDR,192.168.0.125/32  # Switch WiFi
# ── Tailscale UDP 打洞 ──
- AND,((SRC-IP-CIDR,192.168.0.100/32),(NETWORK,UDP),(DST-PORT,41641))  # Tailscale/WireGuard 打洞
- AND,((SRC-IP-CIDR,192.168.0.105/32),(NETWORK,UDP),(DST-PORT,41641))  # Tailscale/WireGuard 打洞
# ── STUN / TURN / WebRTC / P2P 探测 ──
- AND,((SRC-IP-CIDR,192.168.0.100/32),(NETWORK,UDP),(DST-PORT,3478-3481))  # STUN/TURN
- AND,((SRC-IP-CIDR,192.168.0.100/32),(NETWORK,UDP),(DST-PORT,5349))  # STUN/TURN over TLS
- AND,((SRC-IP-CIDR,192.168.0.100/32),(NETWORK,UDP),(DST-PORT,19302-19309))  # Google STUN (WebRTC)
- AND,((SRC-IP-CIDR,192.168.0.105/32),(NETWORK,UDP),(DST-PORT,3478-3481))  # STUN/TURN
- AND,((SRC-IP-CIDR,192.168.0.105/32),(NETWORK,UDP),(DST-PORT,5349))  # STUN/TURN over TLS
- AND,((SRC-IP-CIDR,192.168.0.105/32),(NETWORK,UDP),(DST-PORT,19302-19309))  # Google STUN (WebRTC)
# ── Xbox / Windows 游戏常见 UDP ──
- AND,((SRC-IP-CIDR,192.168.0.100/32),(NETWORK,UDP),(DST-PORT,88))  # Xbox Live / Kerberos
- AND,((SRC-IP-CIDR,192.168.0.100/32),(NETWORK,UDP),(DST-PORT,500))  # IKE / Teredo
- AND,((SRC-IP-CIDR,192.168.0.100/32),(NETWORK,UDP),(DST-PORT,3074))  # Xbox Live 主端口
- AND,((SRC-IP-CIDR,192.168.0.100/32),(NETWORK,UDP),(DST-PORT,3544))  # Teredo (IPv6 NAT 穿透)
- AND,((SRC-IP-CIDR,192.168.0.100/32),(NETWORK,UDP),(DST-PORT,4500))  # IPSec NAT-T
- AND,((SRC-IP-CIDR,192.168.0.105/32),(NETWORK,UDP),(DST-PORT,88))  # Xbox Live / Kerberos
- AND,((SRC-IP-CIDR,192.168.0.105/32),(NETWORK,UDP),(DST-PORT,500))  # IKE / Teredo
- AND,((SRC-IP-CIDR,192.168.0.105/32),(NETWORK,UDP),(DST-PORT,3074))  # Xbox Live 主端口
- AND,((SRC-IP-CIDR,192.168.0.105/32),(NETWORK,UDP),(DST-PORT,3544))  # Teredo (IPv6 NAT 穿透)
- AND,((SRC-IP-CIDR,192.168.0.105/32),(NETWORK,UDP),(DST-PORT,4500))  # IPSec NAT-T
# ── Steam / PC 联机常见 UDP ──
